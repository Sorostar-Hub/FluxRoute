name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --no-frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Typecheck SDK
        run: npx tsc --noEmit -p packages/sdk/tsconfig.json
      - name: Typecheck Solver
        run: npx tsc --noEmit -p packages/solver/tsconfig.json
      - name: Typecheck Indexer
        run: npx tsc --noEmit -p packages/indexer/tsconfig.json
      - name: Typecheck Frontend
        run: npx tsc --noEmit -p frontend/tsconfig.json

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --no-frozen-lockfile
      - name: Run tests with coverage
        run: npx jest --config jest.config.ts --coverage --collectCoverageFrom='packages/sdk/src/utils/**/*.ts'
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --no-frozen-lockfile
      - name: Build frontend
        run: npx --package=next -- next build
        working-directory: frontend
        env:
          NEXT_PUBLIC_INTENT_REGISTRY_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_INTENT_REGISTRY_CONTRACT_ID }}
          NEXT_PUBLIC_SOLVER_SETTLEMENT_CONTRACT_ID: ${{ vars.NEXT_PUBLIC_SOLVER_SETTLEMENT_CONTRACT_ID }}
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
