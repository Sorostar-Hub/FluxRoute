name: Contract Tests

on:
  push:
    paths: ['contracts/**']
  pull_request:
    paths: ['contracts/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Format check
        run: cargo fmt --manifest-path contracts/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path contracts/Cargo.toml --all-targets -- -D warnings

      - name: Run contract tests
        run: cargo test --manifest-path contracts/Cargo.toml

      - name: Build WASM
        run: cargo build --manifest-path contracts/Cargo.toml --target wasm32-unknown-unknown --release
