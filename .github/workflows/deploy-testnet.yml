name: Deploy Testnet

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'scripts/deploy-contracts.sh'
  workflow_dispatch:

concurrency:
  group: deploy-testnet
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install stellar-cli
        run: |
          cargo install --locked stellar-cli --version 21
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build contracts
        run: cargo build --manifest-path contracts/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Optimize WASM
        run: |
          for wasm in contracts/target/wasm32-unknown-unknown/release/*.wasm; do
            stellar contract optimize --wasm "$wasm" 2>/dev/null || true
          done

      - name: Deploy contracts
        env:
          TESTNET_SECRET_KEY: ${{ secrets.TESTNET_SECRET_KEY }}
          STELLAR_NETWORK: testnet
          STELLAR_RPC_URL: https://soroban-testnet.stellar.org
        run: bash scripts/deploy-contracts.sh

      - name: Commit updated contract IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/testnet.contracts.json
          if git diff --cached --quiet; then
            echo "No contract ID changes to commit."
          else
            git commit -m "chore: update testnet contract IDs [skip ci]"
            git push
          fi
