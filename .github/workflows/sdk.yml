name: SDK CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/sdk/**'
      - 'packages/*/package.json'
      - '.github/workflows/sdk.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/sdk/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile
      - name: Lint SDK
        run: pnpm --filter=sdk run lint
      - name: Type-check SDK
        run: pnpm exec tsc --noEmit -p packages/sdk/tsconfig.json

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile
      - name: Build SDK
        run: pnpm --filter=sdk run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: packages/sdk/dist
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile
      - name: Run SDK tests
        run: pnpm --filter=sdk run test
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/sdk/coverage/lcov.info
          flags: sdk
          fail_ci_if_error: false

  validate-exports:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
      - run: pnpm install --no-frozen-lockfile
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: packages/sdk/dist
      - name: Test imports
        run: node -e "const sdk = require('./packages/sdk/dist/index.js'); console.log('SDK imported successfully', Object.keys(sdk).length, 'exports')"
